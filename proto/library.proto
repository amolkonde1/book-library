
syntax = "proto3";

package library;

service LibraryService {
  rpc CreateBook(CreateBookRequest) returns (BookResponse);
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse);

  rpc CreateMember(CreateMemberRequest) returns (MemberResponse);

  rpc BorrowBook(BorrowBookRequest) returns (BorrowResponse);
  rpc ReturnBook(ReturnBookRequest) returns (ReturnResponse);

  rpc GetBorrowedBooksByMember(MemberBorrowQuery) returns (BorrowListResponse);
}

message Book {
  string id = 1;
  string title = 2;
  string author = 3;
  string isbn = 4;
  int32 total_copies = 5;
  int32 available_copies = 6;
}

message CreateBookRequest {
  string title = 1;
  string author = 2;
  string isbn = 3;
  int32 total_copies = 4;
}

message BookResponse {
  Book book = 1;
}

message ListBooksRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListBooksResponse {
  repeated Book books = 1;
}

message CreateMemberRequest {
  string name = 1;
  string email = 2;
  string phone = 3;
}

message Member {
  string id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
}

message MemberResponse {
  Member member = 1;
}

message BorrowBookRequest {
  string member_id = 1;
  string book_id = 2;
}

message BorrowResponse {
  string borrow_id = 1;
  string due_date = 2;
}

message ReturnBookRequest {
  string borrow_id = 1;
}

message ReturnResponse {
  string message = 1;
}

message MemberBorrowQuery {
  string member_id = 1;
}

message BorrowRecord {
  string id = 1;
  string member_id = 2;
  string book_id = 3;
  string status = 4;
  string due_date = 5;
}

message BorrowListResponse {
  repeated BorrowRecord records = 1;
}
